name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Frontend smoke tests
        run: npm run test -- --run
      - name: Install Playwright browser
        run: PLAYWRIGHT_BROWSERS_PATH=.playwright npx playwright install --with-deps chromium
      - name: Browser E2E smoke test
        run: npm run test:e2e

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
      - name: Run Rust tests
        run: cargo test --workspace
